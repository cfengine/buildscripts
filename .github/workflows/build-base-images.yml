name: Build base images

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-push:
    if: contains(fromJSON('["cfengine","mendersoftware","NorthernTechHQ"]'), github.repository_owner)
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        platform:
          - ubuntu-20
          - ubuntu-22
          - ubuntu-24
          - debian-11
          - debian-12
          - debian-13
          - rhel-8
          - rhel-9
          - rhel-10
          - ubuntu-24-mingw
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # QEMU + buildx let the amd64 runner build the arm64 image variant so
      # --push-image can publish a multi-arch manifest.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: ./build-in-container.py --platform ${{ matrix.platform }} --push-image
